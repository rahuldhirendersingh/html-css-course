<style>
  .subscribe-button {
    background-color: rgb(220, 0, 0);
    color: white;
    border: none;
    height: 35px;
    width: 105px;
    border-radius: 2px;
    cursor: pointer;
    margin-right: 8px;
    transition: opacity .25s;
  }

  .subscribe-button:hover {
    opacity: .5;
  }

  .subscribe-button:active {
    opacity: .4;
  }

  .join-button {
    background-color: white;
    color: rgb(41, 118, 211);
    border-color: rgb(41, 118, 211);
    height: 35px;
    width: 70px;
    border-style: solid;
    border-width: 1px;
    border-radius: 2px;
    cursor: pointer;
    margin-right: 8px;
    font-weight: bold;
    transition: color .33s, background-color .33s;
  }

  .join-button:hover {
    color: white;
    background-color: rgb(41, 118, 211);
  }

  .tweet-button {
    background-color: rgb(2, 158, 255);
    color: white;
    height: 36px;
    width: 75px;
    border: none;
    border-radius: 18px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    transition: box-shadow .2s;
  }

  .tweet-button:hover {
    box-shadow: 5px 5px 10px rgba(0, 0, 0, .3);
  }
</style>

<button class="subscribe-button">
  SUBSCRIBE
</button>

<button class="join-button">
  JOIN
</button>

<button class="tweet-button">
  Tweet
</button>
